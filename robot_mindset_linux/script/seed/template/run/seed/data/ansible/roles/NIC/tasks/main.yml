---
- name: Render netplan config for {{ network_name }}
  become: true
  ansible.builtin.template:
    src: netplan.yaml.j2
    dest: "/etc/netplan/90-robot-mindset-{{ network_name }}.yaml"
    mode: '0600'

- name: Apply netplan configuration
  become: true
  ansible.builtin.command:
    cmd: netplan apply
  when: not ansible_check_mode
