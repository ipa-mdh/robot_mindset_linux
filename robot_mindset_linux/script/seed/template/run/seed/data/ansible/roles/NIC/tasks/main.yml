---
- name: Render netplan config for {{ network_name }}
  become: true
  ansible.builtin.copy:
    dest: "/etc/netplan/90-robot-mindset-{{ network_name }}.yaml"
    mode: '0600'
    content: |
      network:
        version: 2
        ethernets:
          {{ ethernet_interface_name }}:
      {% if ipv4 %}
            dhcp4: false
            addresses:
              - {{ ipv4 }}
      {% else %}
            dhcp4: true
      {% endif %}

- name: Apply netplan configuration
  become: true
  ansible.builtin.command:
    cmd: netplan apply
  when: not ansible_check_mode
